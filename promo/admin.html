<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>DiscoCast — Admin</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f; --panel: #14141c; --panel-2: #1b1b25; --line: #2a2a36;
      --text: #ecedf3; --muted: #8d8da0;
      --accent: #6b72a8; --btn: #ededf2; --btn-text: #0e0e13;
      --good: #34d399; --bad: #f87171; --warn: #fbbf24;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font: 15px/1.5 'Inter', -apple-system, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, .brand { font-family: 'Space Grotesk', 'Inter', sans-serif; }
    button { font-family: inherit; cursor: pointer; }
    .hidden { display: none !important; }

    /* ── Password gate ── */
    #gate {
      position: fixed; inset: 0; z-index: 50;
      display: grid; place-items: center; padding: 24px;
      background: radial-gradient(1200px 600px at 50% -10%, #15151f, var(--bg));
    }
    .gate-card {
      width: 100%; max-width: 380px; background: var(--panel);
      border: 1px solid var(--line); border-radius: 18px; padding: 32px 28px;
      box-shadow: 0 30px 80px rgba(0,0,0,.5);
    }
    .gate-card .logo { width: 44px; height: 44px; margin-bottom: 18px; }
    .gate-card h1 { font-size: 22px; margin: 0 0 6px; }
    .gate-card p { color: var(--muted); margin: 0 0 22px; font-size: 14px; }
    .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 7px; }
    input[type=password], input[type=text], input[type=email], textarea {
      width: 100%; background: var(--panel-2); border: 1px solid var(--line);
      color: var(--text); border-radius: 11px; padding: 12px 14px; font: inherit; outline: none;
      transition: border-color .15s;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    .pw { position: relative; }
    .pw input { padding-right: 46px; }
    .pw-toggle { position: absolute; top: 50%; right: 6px; transform: translateY(-50%);
                 width: 34px; height: 34px; display: grid; place-items: center; padding: 0;
                 border: 0; background: transparent; color: var(--muted); border-radius: 8px;
                 transition: color .15s, background .15s; }
    .pw-toggle:hover { color: var(--text); background: var(--panel-2); }
    .btn {
      border: 0; border-radius: 11px; padding: 12px 16px; font-weight: 600; font-size: 15px;
      color: var(--btn-text); background: var(--btn); text-decoration: none;
      display: inline-flex; align-items: center; justify-content: center;
      width: 100%; margin-top: 16px; transition: background .15s;
    }
    .btn:hover { background: #fff; }
    .btn:active { transform: translateY(1px); }
    .btn.ghost { background: var(--panel-2); border: 1px solid var(--line); color: var(--text); }
    .btn.sm { width: auto; padding: 8px 13px; font-size: 13px; margin: 0; }
    .err { color: var(--bad); font-size: 13px; margin-top: 12px; min-height: 18px; }

    /* ── App shell ── */
    .wrap { max-width: 920px; margin: 0 auto; padding: 26px 20px 80px; }
    header.top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 26px; }
    .brand { display: flex; align-items: center; gap: 11px; font-size: 19px; font-weight: 700; }
    .brand img { width: 30px; height: 30px; }
    .tabs { display: flex; gap: 6px; background: var(--panel); border: 1px solid var(--line);
            border-radius: 13px; padding: 5px; margin-bottom: 24px; width: fit-content; }
    .tab { border: 0; background: transparent; color: var(--muted); padding: 9px 16px;
           border-radius: 9px; font-weight: 600; font-size: 14px; }
    .tab.active { background: var(--panel-2); color: var(--text); }
    .tab .badge { display: inline-block; min-width: 18px; padding: 0 5px; margin-left: 6px;
                  background: var(--accent); color: #fff; border-radius: 9px; font-size: 11px;
                  line-height: 18px; text-align: center; }

    .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 22px; }
    .stat { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; padding: 20px; }
    .stat .k { color: var(--muted); font-size: 13px; margin-bottom: 8px; }
    .stat .v { font-family: 'Space Grotesk'; font-size: 32px; font-weight: 700;
               font-variant-numeric: tabular-nums; }
    .meta { color: var(--muted); font-size: 13px; display: flex; justify-content: space-between;
            align-items: center; gap: 14px; flex-wrap: wrap; }
    @media (max-width: 680px) { .cards { grid-template-columns: repeat(2, 1fr); } }

    /* ── Locations ── */
    .geo { margin-top: 30px; }
    .geo-title { font-size: 16px; margin: 0 0 14px; }
    .geo-table { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; overflow: hidden; }
    .geo-row { display: grid; grid-template-columns: 1fr 90px 90px 1fr; gap: 14px; align-items: center;
               padding: 12px 18px; border-top: 1px solid var(--line); font-size: 14px; }
    .geo-row:first-child { border-top: 0; }
    .geo-row.head { color: var(--muted); font-size: 12px; text-transform: uppercase;
                    letter-spacing: .04em; font-weight: 600; background: var(--panel-2); }
    .geo-row .country { display: flex; align-items: center; gap: 9px; font-weight: 600; }
    .geo-row .flag { font-size: 18px; line-height: 1; }
    .geo-row .num { font-variant-numeric: tabular-nums; text-align: right; }
    .geo-bar { height: 7px; border-radius: 999px; background: var(--panel-2); overflow: hidden; }
    .geo-bar > i { display: block; height: 100%; background: var(--accent); border-radius: 999px; }
    @media (max-width: 680px) { .geo-row { grid-template-columns: 1fr 60px 60px; } .geo-row .geo-bar { display: none; } }

    .filters { display: flex; gap: 7px; margin-bottom: 16px; flex-wrap: wrap; }
    .chip { border: 1px solid var(--line); background: var(--panel); color: var(--muted);
            border-radius: 999px; padding: 7px 14px; font-size: 13px; font-weight: 600; }
    .chip.active { color: var(--text); border-color: var(--accent); background: #21212c; }

    .sub { display: grid; grid-template-columns: 190px 1fr auto; gap: 22px;
           background: var(--panel); border: 1px solid var(--line); border-radius: 16px;
           padding: 18px; margin-bottom: 14px; align-items: center; }
    .sub img { width: 190px; height: 130px; object-fit: cover; border-radius: 12px;
               background: var(--panel-2); cursor: zoom-in; transition: opacity .15s; }
    .sub img:hover { opacity: .82; }
    .sub .name { font-weight: 600; font-size: 20px; cursor: pointer; }
    .sub .name:hover { color: #fff; }
    .sub .desc { color: var(--muted); font-size: 15px; line-height: 1.5; margin: 8px 0 11px;
                 display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .sub .info { color: var(--muted); font-size: 14px; }
    .sub .actions { display: flex; flex-direction: column; gap: 7px; }
    .tag { display: inline-block; padding: 2px 9px; border-radius: 999px; font-size: 11px;
           font-weight: 700; text-transform: uppercase; letter-spacing: .03em; }
    .tag.pending { background: #3a2e10; color: var(--warn); }
    .tag.approved { background: #0f3326; color: var(--good); }
    .tag.rejected { background: #3a1717; color: var(--bad); }
    .btn.good { background: #14352a; color: var(--good); border: 1px solid #1d513e; }
    .btn.bad  { background: #351717; color: var(--bad);  border: 1px solid #512020; }
    .empty { color: var(--muted); text-align: center; padding: 60px 0; }
    a.link { color: #aab0e0; text-decoration: none; font-size: 13.5px; }
    @media (max-width: 680px) { .sub { grid-template-columns: 120px 1fr; } .sub img { width: 120px; height: 84px; }
      .sub .actions { grid-column: 1 / -1; flex-direction: row; flex-wrap: wrap; } }

    /* ── Detail / lightbox modal ── */
    .modal-bg { position: fixed; inset: 0; z-index: 60; padding: 28px; display: grid; place-items: center;
                background: rgba(5,5,9,.8); backdrop-filter: blur(5px); }
    .modal { position: relative; width: 100%; max-width: 780px; max-height: 90vh; overflow: auto;
             background: var(--panel); border: 1px solid var(--line); border-radius: 20px; padding: 24px; }
    .modal img { width: 100%; max-height: 480px; object-fit: contain; border-radius: 14px;
                 background: #000; margin-bottom: 20px; }
    .modal h2 { font-size: 26px; margin: 0 0 8px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .modal .m-info { color: var(--muted); font-size: 15px; margin-bottom: 16px; }
    .modal .m-desc { font-size: 17px; line-height: 1.65; margin: 0 0 22px; white-space: pre-wrap; word-break: break-word; }
    .modal .m-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .modal .m-actions .btn { width: auto; margin: 0; }
    .modal .x { position: absolute; top: 14px; right: 16px; width: 36px; height: 36px; border-radius: 50%;
                border: 1px solid var(--line); background: rgba(10,10,15,.6); color: var(--text);
                font-size: 18px; line-height: 1; display: grid; place-items: center; }
  </style>
</head>
<body>
  <!-- Password gate -->
  <div id="gate">
    <div class="gate-card">
      <img class="logo" src="/favicon.svg" alt="">
      <h1>Admin access</h1>
      <p>Enter the admin key to manage stats and preset submissions.</p>
      <form id="gate-form">
        <div class="field">
          <label for="key">Admin key</label>
          <div class="pw">
            <input id="key" type="password" autocomplete="current-password" autofocus>
            <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Show key" aria-pressed="false" title="Show key">
              <svg class="eye" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg class="eye-off hidden" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c6.5 0 10 7 10 7a18.5 18.5 0 0 1-2.16 3.19M6.61 6.61A18.5 18.5 0 0 0 2 12s3.5 7 10 7a9.12 9.12 0 0 0 5.39-1.61"></path>
                <path d="M9.88 9.88a3 3 0 0 0 4.24 4.24"></path>
                <line x1="2" y1="2" x2="22" y2="22"></line>
              </svg>
            </button>
          </div>
        </div>
        <button class="btn" type="submit">Unlock</button>
        <div class="err" id="gate-err"></div>
      </form>
    </div>
  </div>

  <!-- App -->
  <div class="wrap hidden" id="app">
    <header class="top">
      <div class="brand"><img src="/logo.png" alt="">DiscoCast Admin</div>
      <button class="btn ghost sm" id="logout">Log out</button>
    </header>

    <div class="tabs">
      <button class="tab active" data-tab="stats">Stats</button>
      <button class="tab" data-tab="subs">Submissions <span class="badge hidden" id="pending-badge">0</span></button>
    </div>

    <!-- Stats -->
    <section id="panel-stats">
      <div class="cards">
        <div class="stat"><div class="k">Page views</div><div class="v" id="s-views">—</div></div>
        <div class="stat"><div class="k">Downloads · macOS</div><div class="v" id="s-mac">—</div></div>
        <div class="stat"><div class="k">Downloads · Windows</div><div class="v" id="s-win">—</div></div>
        <div class="stat"><div class="k">Downloads · total</div><div class="v" id="s-total">—</div></div>
      </div>
      <div class="meta">
        <span id="s-meta">—</span>
        <button class="btn bad sm" id="reset">Reset stats</button>
      </div>

      <div class="geo">
        <h3 class="geo-title">Locations</h3>
        <div id="geo-list"></div>
      </div>
    </section>

    <!-- Submissions -->
    <section id="panel-subs" class="hidden">
      <div class="filters" id="filters">
        <button class="chip active" data-f="pending">Pending</button>
        <button class="chip" data-f="approved">Approved</button>
        <button class="chip" data-f="rejected">Rejected</button>
        <button class="chip" data-f="all">All</button>
      </div>
      <div id="sub-list"></div>
    </section>
  </div>

  <!-- Detail / lightbox modal -->
  <div class="modal-bg hidden" id="modal">
    <div class="modal" id="modal-card"></div>
  </div>

  <script>
    const $ = (s) => document.querySelector(s);
    const KEY_STORE = 'discocast-admin-key';
    const EXP_STORE = 'discocast-admin-exp';
    const SESSION_MS = 60 * 24 * 60 * 60 * 1000; // stay logged in for 60 days

    // Read a persisted key only if it hasn't passed its 60-day expiry.
    function loadStoredKey() {
      const key = localStorage.getItem(KEY_STORE);
      const exp = Number(localStorage.getItem(EXP_STORE) || 0);
      if (!key || !exp || Date.now() > exp) { clearStoredKey(); return ''; }
      return key;
    }
    function saveStoredKey(key) {
      localStorage.setItem(KEY_STORE, key);
      localStorage.setItem(EXP_STORE, String(Date.now() + SESSION_MS));
    }
    function clearStoredKey() {
      localStorage.removeItem(KEY_STORE);
      localStorage.removeItem(EXP_STORE);
    }

    let KEY = loadStoredKey();
    let SUBS = [];
    let filter = 'pending';

    function api(path, opts = {}) {
      return fetch(path, { ...opts, headers: { 'x-admin-key': KEY, ...(opts.headers || {}) } });
    }

    // ── Auth ──
    async function tryUnlock(key) {
      const r = await fetch('/api/stats', { headers: { 'x-admin-key': key } });
      return r.ok;
    }
    $('#gate-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const key = $('#key').value.trim();
      $('#gate-err').textContent = '';
      if (await tryUnlock(key)) {
        KEY = key; saveStoredKey(key);
        enterApp();
      } else {
        $('#gate-err').textContent = 'Wrong key. Try again.';
      }
    });
    $('#logout').addEventListener('click', () => {
      clearStoredKey(); location.reload();
    });

    // Show / hide the admin key
    $('#pw-toggle').addEventListener('click', () => {
      const input = $('#key');
      const show = input.type === 'password';
      input.type = show ? 'text' : 'password';
      const btn = $('#pw-toggle');
      btn.setAttribute('aria-pressed', String(show));
      btn.setAttribute('aria-label', show ? 'Hide key' : 'Show key');
      btn.title = show ? 'Hide key' : 'Show key';
      btn.querySelector('.eye').classList.toggle('hidden', show);
      btn.querySelector('.eye-off').classList.toggle('hidden', !show);
      input.focus();
    });

    async function enterApp() {
      $('#gate').classList.add('hidden');
      $('#app').classList.remove('hidden');
      await Promise.all([loadStats(), loadSubs()]);
    }

    // ── Tabs ──
    document.querySelectorAll('.tab').forEach((t) => t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach((x) => x.classList.remove('active'));
      t.classList.add('active');
      const tab = t.dataset.tab;
      $('#panel-stats').classList.toggle('hidden', tab !== 'stats');
      $('#panel-subs').classList.toggle('hidden', tab !== 'subs');
    }));

    // ── Stats ──
    async function loadStats() {
      const r = await api('/api/stats');
      if (!r.ok) return;
      const c = await r.json();
      $('#s-views').textContent = c.pageViews ?? 0;
      $('#s-mac').textContent = c.downloads.mac ?? 0;
      $('#s-win').textContent = c.downloads.windows ?? 0;
      $('#s-total').textContent = c.total ?? 0;
      const since = c.firstSeen ? new Date(c.firstSeen).toLocaleString() : '—';
      const upd = c.updated ? new Date(c.updated).toLocaleString() : '—';
      $('#s-meta').textContent = `Counting since ${since} · last update ${upd}`;
      renderGeo(c.geo && c.geo.countries);
    }

    // ── Locations ──
    const countryNames = (() => {
      try { return new Intl.DisplayNames(['en'], { type: 'region' }); } catch { return null; }
    })();
    function countryName(cc) {
      if (cc === 'ZZ') return 'Unknown';
      try { return countryNames ? countryNames.of(cc) : cc; } catch { return cc; }
    }
    function flag(cc) {
      if (cc === 'ZZ' || !/^[A-Z]{2}$/.test(cc)) return '🌐';
      return String.fromCodePoint(...[...cc].map((ch) => 0x1f1e6 + ch.charCodeAt(0) - 65));
    }
    function renderGeo(countries) {
      const el = $('#geo-list');
      const rows = Object.entries(countries || {})
        .map(([cc, v]) => ({ cc, views: v.views || 0, downloads: v.downloads || 0, total: (v.views || 0) + (v.downloads || 0) }))
        .filter((r) => r.total > 0)
        .sort((a, b) => b.total - a.total);
      if (!rows.length) { el.innerHTML = `<div class="empty">No location data yet.</div>`; return; }
      const max = rows[0].total;
      el.innerHTML = `<div class="geo-table">
        <div class="geo-row head"><span>Country</span><span class="num">Views</span><span class="num">Downloads</span><span></span></div>
        ${rows.map((r) => `
          <div class="geo-row">
            <span class="country"><span class="flag">${flag(r.cc)}</span>${esc(countryName(r.cc))}</span>
            <span class="num">${r.views}</span>
            <span class="num">${r.downloads}</span>
            <span class="geo-bar"><i style="width:${Math.round((r.total / max) * 100)}%"></i></span>
          </div>`).join('')}
      </div>`;
    }
    $('#reset').addEventListener('click', async () => {
      if (!confirm('Reset all stats to zero? This cannot be undone.')) return;
      await api('/api/stats/reset', { method: 'POST' });
      loadStats();
    });

    // ── Submissions ──
    document.querySelectorAll('.chip').forEach((c) => c.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach((x) => x.classList.remove('active'));
      c.classList.add('active'); filter = c.dataset.f; renderSubs();
    }));

    async function loadSubs() {
      const r = await api('/api/submissions');
      if (!r.ok) return;
      SUBS = await r.json();
      const pending = SUBS.filter((s) => s.status === 'pending').length;
      const badge = $('#pending-badge');
      badge.textContent = pending;
      badge.classList.toggle('hidden', pending === 0);
      renderSubs();
    }

    function renderSubs() {
      const list = filter === 'all' ? SUBS : SUBS.filter((s) => s.status === filter);
      const el = $('#sub-list');
      if (!list.length) { el.innerHTML = `<div class="empty">No ${filter === 'all' ? '' : filter} submissions.</div>`; return; }
      el.innerHTML = list.map((s) => `
        <div class="sub" data-id="${s.id}">
          <img src="/api/submissions/${s.id}/image?key=${encodeURIComponent(KEY)}" alt="" loading="lazy" data-open title="View larger">
          <div>
            <div class="name" data-open>${esc(s.name)} <span class="tag ${s.status}">${s.status}</span></div>
            <div class="desc">${esc(s.description)}</div>
            <div class="info">${esc(s.email)} · ${new Date(s.createdAt).toLocaleString()}
              · <a class="link" href="/api/submissions/${s.id}/preset?key=${encodeURIComponent(KEY)}">download preset</a></div>
          </div>
          <div class="actions">
            <button class="btn ghost sm" data-act="view">View</button>
            ${s.status !== 'approved' ? `<button class="btn good sm" data-act="approve">Approve</button>` : ''}
            ${s.status !== 'rejected' ? `<button class="btn bad sm" data-act="reject">Reject</button>` : ''}
            <button class="btn ghost sm" data-act="delete">Delete</button>
          </div>
        </div>`).join('');
      el.querySelectorAll('.sub').forEach((row) => {
        const id = row.dataset.id;
        row.querySelectorAll('[data-act]').forEach((b) => b.addEventListener('click', () =>
          b.dataset.act === 'view' ? openModal(id) : act(id, b.dataset.act)));
        row.querySelectorAll('[data-open]').forEach((o) => o.addEventListener('click', () => openModal(id)));
      });
    }

    // ── Detail modal ──
    function openModal(id) {
      const s = SUBS.find((x) => x.id === id); if (!s) return;
      const k = encodeURIComponent(KEY);
      $('#modal-card').innerHTML = `
        <button class="x" data-act="close" title="Close">✕</button>
        <img src="/api/submissions/${id}/image?key=${k}" alt="">
        <h2>${esc(s.name)} <span class="tag ${s.status}">${s.status}</span></h2>
        <div class="m-info">${esc(s.email)} · ${new Date(s.createdAt).toLocaleString()}</div>
        <div class="m-desc">${esc(s.description)}</div>
        <div class="m-actions">
          <a class="btn" href="/api/submissions/${id}/preset?key=${k}">Download preset</a>
          ${s.status !== 'approved' ? `<button class="btn good" data-act="approve">Approve</button>` : ''}
          ${s.status !== 'rejected' ? `<button class="btn bad" data-act="reject">Reject</button>` : ''}
          <button class="btn ghost" data-act="delete">Delete</button>
        </div>`;
      $('#modal-card').querySelectorAll('[data-act]').forEach((b) => b.addEventListener('click', async () => {
        if (b.dataset.act === 'close') return closeModal();
        await act(id, b.dataset.act);
        closeModal();
      }));
      $('#modal').classList.remove('hidden');
    }
    function closeModal() { $('#modal').classList.add('hidden'); }
    $('#modal').addEventListener('click', (e) => { if (e.target.id === 'modal') closeModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

    async function act(id, action) {
      if (action === 'delete' && !confirm('Delete this submission permanently?')) return;
      const method = action === 'delete' ? 'DELETE' : 'POST';
      const url = action === 'delete' ? `/api/submissions/${id}` : `/api/submissions/${id}/${action}`;
      await api(url, { method });
      loadSubs();
    }

    function esc(s) { return (s || '').replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }

    // ── Boot: if a stored key still works, skip the gate ──
    (async () => { if (KEY && await tryUnlock(KEY)) enterApp(); })();
  </script>
</body>
